<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folio — PDF 병합 · 편집</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:   #faf9f6;
    --panel:   #ffffff;
    --ink:     #1c1b19;
    --muted:   #6f6b63;
    --faint:   #97928a;
    --line:    #e8e4dc;
    --line-2:  #f0ede6;
    --accent:  #2f4858;
    --accent-soft: #eef2f3;
    --danger:  #9c3a2a;
    --shadow:  0 1px 2px rgba(28,27,25,.04), 0 8px 24px -12px rgba(28,27,25,.18);
    --shadow-lift: 0 2px 6px rgba(28,27,25,.06), 0 18px 40px -16px rgba(28,27,25,.28);
    --radius:  10px;
    --ease:    cubic-bezier(.22,.61,.36,1);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky; top: 0; z-index: 40;
    background: rgba(250,249,246,.82);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .bar {
    max-width: 1180px; margin: 0 auto;
    padding: 18px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .wordmark { display: flex; align-items: baseline; gap: 10px; }
  .wordmark .mark {
    font-family: "Newsreader", serif;
    font-size: 23px; font-weight: 500; letter-spacing: -.01em;
    color: var(--ink);
  }
  .wordmark .dot { color: var(--accent); }
  .wordmark .sub {
    font-size: 12px; color: var(--faint); letter-spacing: .02em;
  }
  .privacy {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--muted);
    padding: 6px 12px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--panel);
  }
  .privacy svg { width: 14px; height: 14px; color: var(--accent); }

  /* ---------- Layout ---------- */
  main { max-width: 1180px; margin: 0 auto; padding: 40px 32px 120px; }

  /* ---------- Empty / dropzone ---------- */
  .hero { text-align: center; padding: 24px 0 8px; }
  .hero h1 {
    font-family: "Newsreader", serif;
    font-weight: 400; font-size: 40px; line-height: 1.15;
    letter-spacing: -.015em; margin: 0 0 14px;
  }
  .hero p { color: var(--muted); font-size: 15px; max-width: 30em; margin: 0 auto; }

  .dropzone {
    margin: 40px auto 0; max-width: 640px;
    border: 1px dashed var(--line);
    border-radius: 16px;
    background: var(--panel);
    padding: 56px 40px;
    text-align: center;
    transition: border-color .25s var(--ease), background .25s var(--ease), transform .25s var(--ease);
    cursor: pointer;
  }
  .dropzone:hover { border-color: #d6d0c5; }
  .dropzone.drag {
    border-color: var(--accent); background: var(--accent-soft);
    transform: translateY(-2px);
  }
  .dropzone .ico {
    width: 52px; height: 52px; margin: 0 auto 22px;
    color: var(--accent);
    display: grid; place-items: center;
  }
  .dropzone .ico svg { width: 100%; height: 100%; stroke-width: 1.25; }
  .dropzone h2 { font-size: 17px; font-weight: 550; margin: 0 0 6px; letter-spacing: -.01em; }
  .dropzone .hint { color: var(--faint); font-size: 13px; }
  .dropzone .browse { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

  /* ---------- Toolbar ---------- */
  .toolbar {
    position: sticky; top: 73px; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    padding: 14px 0; margin-bottom: 26px;
    background: linear-gradient(var(--paper) 70%, transparent);
  }
  .count {
    font-size: 13px; color: var(--muted);
    display: flex; align-items: baseline; gap: 6px;
  }
  .count b { color: var(--ink); font-weight: 600; font-size: 15px; font-variant-numeric: tabular-nums; }
  .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font: inherit; font-size: 13px; font-weight: 500;
    padding: 9px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink);
    cursor: pointer; white-space: nowrap;
    transition: border-color .18s, background .18s, color .18s, box-shadow .18s, opacity .18s;
  }
  .btn svg { width: 16px; height: 16px; stroke-width: 1.6; }
  .btn:hover { border-color: #d6d0c5; background: #fcfbf9; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.ghost { border-color: transparent; background: transparent; color: var(--muted); }
  .btn.ghost:hover { background: var(--line-2); color: var(--ink); }
  .btn.danger:hover { color: var(--danger); border-color: #e7c9c1; background: #fcf4f2; }
  .btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
    box-shadow: 0 1px 2px rgba(47,72,88,.25);
  }
  .btn.primary:hover { background: #25394656; background: #263b47; }
  .btn.primary:disabled { background: var(--accent); }

  .divider { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }

  .selbar {
    display: none; align-items: center; gap: 10px;
  }
  .selbar.show { display: flex; }
  .selbar .selcount { font-size: 13px; color: var(--accent); font-weight: 500; }

  /* ---------- Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
    gap: 22px;
  }

  .card {
    position: relative;
    border-radius: var(--radius);
    transition: transform .2s var(--ease), opacity .2s var(--ease);
  }
  .card.dragging { opacity: .35; }
  .card.drop-before::before, .card.drop-after::after {
    content: ""; position: absolute; top: 6px; bottom: 30px;
    width: 3px; border-radius: 3px; background: var(--accent);
  }
  .card.drop-before::before { left: -13px; }
  .card.drop-after::after  { right: -13px; }

  .thumb {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    aspect-ratio: 3 / 4;
    display: grid; place-items: center;
    overflow: hidden;
    cursor: grab;
    transition: box-shadow .2s var(--ease), border-color .2s var(--ease);
  }
  .thumb:active { cursor: grabbing; }
  .card:hover .thumb { box-shadow: var(--shadow-lift); border-color: #ddd7cc; }
  .thumb canvas {
    max-width: 100%; max-height: 100%;
    display: block;
    background: #fff;
  }
  .thumb .loading {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--line); border-top-color: var(--accent);
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card.selected .thumb { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), var(--shadow); }

  /* page index ribbon */
  .pageno {
    position: absolute; left: 8px; bottom: 8px; z-index: 3;
    font-size: 11px; font-variant-numeric: tabular-nums;
    color: #fff; background: rgba(28,27,25,.72);
    padding: 2px 7px; border-radius: 5px; letter-spacing: .02em;
    backdrop-filter: blur(2px);
  }

  /* selection checkbox */
  .check {
    position: absolute; top: 8px; left: 8px; z-index: 4;
    width: 22px; height: 22px; border-radius: 6px;
    border: 1.5px solid var(--line); background: rgba(255,255,255,.92);
    display: grid; place-items: center; cursor: pointer;
    opacity: 0; transform: scale(.9);
    transition: opacity .15s, transform .15s, background .15s, border-color .15s;
  }
  .check svg { width: 14px; height: 14px; color: #fff; stroke-width: 2.4; opacity: 0; }
  .card:hover .check, .card.selected .check, body.has-sel .check { opacity: 1; transform: scale(1); }
  .card.selected .check { background: var(--accent); border-color: var(--accent); }
  .card.selected .check svg { opacity: 1; }

  /* hover actions */
  .actions {
    position: absolute; top: 8px; right: 8px; z-index: 4;
    display: flex; gap: 4px;
    opacity: 0; transform: translateY(-3px);
    transition: opacity .15s var(--ease), transform .15s var(--ease);
  }
  .card:hover .actions { opacity: 1; transform: none; }
  .iconbtn {
    width: 30px; height: 30px; border-radius: 7px;
    border: 1px solid var(--line); background: rgba(255,255,255,.94);
    backdrop-filter: blur(3px);
    display: grid; place-items: center; cursor: pointer; color: var(--ink);
    transition: background .15s, color .15s, border-color .15s;
  }
  .iconbtn svg { width: 15px; height: 15px; stroke-width: 1.7; }
  .iconbtn:hover { background: #fff; border-color: #cfc8bb; }
  .iconbtn.del:hover { color: var(--danger); border-color: #e7c9c1; }

  .meta {
    margin-top: 9px; padding: 0 2px;
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--faint);
  }
  .meta .fname {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .meta .filedot {
    width: 7px; height: 7px; border-radius: 50%; flex: none;
    background: var(--accent); opacity: .55;
  }

  /* ---------- Footer note ---------- */
  .foot {
    max-width: 1180px; margin: 0 auto; padding: 0 32px 60px;
    color: var(--faint); font-size: 12px; text-align: center;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; font-size: 13px;
    padding: 11px 18px; border-radius: 10px; box-shadow: var(--shadow-lift);
    display: flex; align-items: center; gap: 9px;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s var(--ease);
    z-index: 60;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; color: #9fd6b0; stroke-width: 2; }

  .hidden { display: none !important; }

  /* progress overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 70;
    background: rgba(250,249,246,.78); backdrop-filter: blur(4px);
    display: none; place-items: center;
  }
  .overlay.show { display: grid; }
  .overlay .box {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 30px 36px; box-shadow: var(--shadow-lift);
    text-align: center; min-width: 240px;
  }
  .overlay .ring {
    width: 30px; height: 30px; margin: 0 auto 16px; border-radius: 50%;
    border: 2.5px solid var(--line); border-top-color: var(--accent);
    animation: spin .7s linear infinite;
  }
  .overlay .box p { margin: 0; font-size: 14px; color: var(--ink); }

  @media (max-width: 640px) {
    .bar, main, .foot { padding-left: 20px; padding-right: 20px; }
    .privacy .txt { display: none; }
    .hero h1 { font-size: 32px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
    .toolbar { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="wordmark">
      <span class="mark">Folio<span class="dot">.</span></span>
      <span class="sub">PDF 병합 · 편집</span>
    </div>
    <div class="privacy" title="파일이 서버로 전송되지 않습니다">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      <span class="txt">브라우저 안에서만 처리</span>
    </div>
  </div>
</header>

<main>
  <!-- Empty state -->
  <section id="empty">
    <div class="hero">
      <h1>여러 PDF를 하나로,<br>원하는 순서대로.</h1>
      <p>파일을 불러와 페이지를 삭제하고, 회전하고, 끌어서 순서를 바꾼 뒤 하나의 PDF로 저장하세요. 모든 작업은 이 브라우저 안에서만 이뤄집니다.</p>
    </div>
    <div class="dropzone" id="dropzone">
      <div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      </div>
      <h2>PDF 파일을 여기에 끌어다 놓으세요</h2>
      <div class="hint">또는 <span class="browse">파일 선택</span> · 여러 개를 한 번에</div>
    </div>
  </section>

  <!-- Editor -->
  <section id="editor" class="hidden">
    <div class="toolbar">
      <div class="count"><b id="pageCount">0</b><span>페이지</span><span id="fileCount" style="color:var(--faint)"></span></div>

      <div class="selbar" id="selbar">
        <div class="divider"></div>
        <span class="selcount"><span id="selN">0</span>개 선택됨</span>
        <button class="btn ghost" id="selRotL"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>왼쪽 회전</button>
        <button class="btn ghost" id="selRotR"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>오른쪽 회전</button>
        <button class="btn ghost danger" id="selDel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>삭제</button>
        <button class="btn ghost" id="selClear">선택 해제</button>
      </div>

      <div class="spacer"></div>

      <button class="btn" id="addMore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>PDF 추가</button>
      <button class="btn ghost danger" id="clearAll"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>모두 비우기</button>
      <div class="divider"></div>
      <button class="btn primary" id="merge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>병합하여 저장</button>
    </div>

    <div class="grid" id="grid"></div>
  </section>
</main>

<div class="foot" id="foot">
  Folio — 로컬 전용 PDF 편집기. 불러온 파일은 어디에도 업로드되지 않습니다.
</div>

<input type="file" id="fileInput" accept="application/pdf,.pdf" multiple class="hidden" />

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
  <span id="toastMsg"></span>
</div>

<div class="overlay" id="overlay">
  <div class="box">
    <div class="ring"></div>
    <p id="overlayMsg">처리 중…</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
(function () {
  "use strict";

  const { degrees } = PDFLib;
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  // ---- State ----
  const sources = new Map();   // srcId -> { bytes: Uint8Array, pdfjs, name }
  let pages = [];              // [{ id, srcId, index, rotation, name }]
  let uid = 0;
  let palette = ["#2f4858", "#7a5c3e", "#3e6b57", "#6b3e5c", "#3e556b", "#6b6b3e"];
  let colorMap = new Map();

  // ---- Elements ----
  const $ = (s) => document.querySelector(s);
  const empty = $("#empty"), editor = $("#editor"), grid = $("#grid");
  const dropzone = $("#dropzone"), fileInput = $("#fileInput");
  const pageCountEl = $("#pageCount"), fileCountEl = $("#fileCount");
  const selbar = $("#selbar"), selN = $("#selN");
  const overlay = $("#overlay"), overlayMsg = $("#overlayMsg");

  function colorFor(srcId) {
    if (!colorMap.has(srcId)) colorMap.set(srcId, palette[colorMap.size % palette.length]);
    return colorMap.get(srcId);
  }

  // ---- Toast ----
  let toastTimer;
  function toast(msg) {
    $("#toastMsg").textContent = msg;
    $("#toast").classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $("#toast").classList.remove("show"), 2600);
  }

  // ---- File loading ----
  async function loadFiles(fileList) {
    const files = Array.from(fileList).filter(
      (f) => f.type === "application/pdf" || f.name.toLowerCase().endsWith(".pdf")
    );
    if (!files.length) { toast("PDF 파일만 불러올 수 있습니다."); return; }

    overlay.classList.add("show");
    let added = 0;
    for (const file of files) {
      try {
        overlayMsg.textContent = `${file.name} 불러오는 중…`;
        const buf = new Uint8Array(await file.arrayBuffer());
        // pdf.js needs its own copy (it transfers/detaches the buffer)
        const pdfjsDoc = await pdfjsLib.getDocument({ data: buf.slice() }).promise;
        const srcId = "s" + (uid++);
        sources.set(srcId, { bytes: buf, pdfjs: pdfjsDoc, name: file.name });
        for (let i = 1; i <= pdfjsDoc.numPages; i++) {
          pages.push({ id: "p" + (uid++), srcId, index: i, rotation: 0, name: file.name });
        }
        added += pdfjsDoc.numPages;
      } catch (e) {
        console.error(e);
        toast(`"${file.name}" 을(를) 열 수 없습니다.`);
      }
    }
    overlay.classList.remove("show");
    if (added) {
      render();
      toast(`${added}개 페이지를 불러왔습니다.`);
    }
  }

  // ---- Render the grid ----
  function render() {
    const has = pages.length > 0;
    empty.classList.toggle("hidden", has);
    editor.classList.toggle("hidden", !has);
    $("#foot").classList.toggle("hidden", false);
    if (!has) { grid.innerHTML = ""; updateBars(); return; }

    pageCountEl.textContent = pages.length;
    const fileN = new Set(pages.map((p) => p.srcId)).size;
    fileCountEl.textContent = `· ${fileN}개 파일`;

    // Reconcile DOM with state (keep existing cards/canvases to avoid re-render flashes)
    const existing = new Map();
    grid.querySelectorAll(".card").forEach((c) => existing.set(c.dataset.id, c));

    const frag = document.createDocumentFragment();
    pages.forEach((p, i) => {
      let card = existing.get(p.id);
      if (card) {
        existing.delete(p.id);
      } else {
        card = buildCard(p);
      }
      card.querySelector(".pageno").textContent = i + 1;
      card.querySelector(".filedot").style.background = colorFor(p.srcId);
      card.classList.toggle("selected", !!p.selected);
      frag.appendChild(card);
    });
    existing.forEach((c) => c.remove());
    grid.appendChild(frag);
    updateBars();
  }

  function buildCard(p) {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = p.id;
    card.draggable = true;
    card.innerHTML = `
      <div class="thumb">
        <div class="loading"></div>
        <span class="pageno"></span>
        <div class="check" title="선택"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <div class="actions">
          <div class="iconbtn rotl" title="왼쪽으로 회전"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg></div>
          <div class="iconbtn rotr" title="오른쪽으로 회전"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg></div>
          <div class="iconbtn del" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>
        </div>
      </div>
      <div class="meta"><span class="filedot"></span><span class="fname">${escapeHtml(p.name)}</span></div>
    `;

    // events
    card.querySelector(".rotl").addEventListener("click", (e) => { e.stopPropagation(); rotate([p.id], -90); });
    card.querySelector(".rotr").addEventListener("click", (e) => { e.stopPropagation(); rotate([p.id], 90); });
    card.querySelector(".del").addEventListener("click", (e) => { e.stopPropagation(); removePages([p.id]); });
    card.querySelector(".check").addEventListener("click", (e) => { e.stopPropagation(); toggleSelect(p.id); });

    bindDrag(card);
    renderThumb(card, p);
    return card;
  }

  // ---- Thumbnail rendering ----
  async function renderThumb(card, p) {
    const thumb = card.querySelector(".thumb");
    try {
      const src = sources.get(p.srcId);
      const page = await src.pdfjs.getPage(p.index);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const base = page.getViewport({ scale: 1, rotation: (page.rotate + p.rotation + 360) % 360 });
      const targetW = 320;
      const scale = (targetW / base.width) * dpr;
      const vp = page.getViewport({ scale, rotation: (page.rotate + p.rotation + 360) % 360 });

      const canvas = document.createElement("canvas");
      canvas.width = Math.ceil(vp.width);
      canvas.height = Math.ceil(vp.height);
      canvas.style.width = (vp.width / dpr) + "px";
      canvas.style.height = (vp.height / dpr) + "px";
      const ctx = canvas.getContext("2d");
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      const old = thumb.querySelector("canvas");
      if (old) old.remove();
      const loader = thumb.querySelector(".loading");
      if (loader) loader.remove();
      thumb.insertBefore(canvas, thumb.firstChild);
    } catch (e) {
      console.error(e);
    }
  }

  // ---- Operations ----
  function rotate(ids, delta) {
    const set = new Set(ids);
    pages.forEach((p) => {
      if (set.has(p.id)) {
        p.rotation = (p.rotation + delta + 360) % 360;
        const card = grid.querySelector(`.card[data-id="${p.id}"]`);
        if (card) renderThumb(card, p);
      }
    });
  }

  function removePages(ids) {
    const set = new Set(ids);
    pages = pages.filter((p) => !set.has(p.id));
    pruneSources();
    render();
  }

  function pruneSources() {
    const used = new Set(pages.map((p) => p.srcId));
    for (const id of [...sources.keys()]) if (!used.has(id)) sources.delete(id);
  }

  function toggleSelect(id) {
    const p = pages.find((x) => x.id === id);
    if (p) { p.selected = !p.selected; render(); }
  }

  function clearSelection() { pages.forEach((p) => (p.selected = false)); render(); }
  function selectedIds() { return pages.filter((p) => p.selected).map((p) => p.id); }

  function updateBars() {
    const sel = selectedIds();
    selbar.classList.toggle("show", sel.length > 0);
    document.body.classList.toggle("has-sel", sel.length > 0);
    selN.textContent = sel.length;
  }

  // ---- Drag & drop reordering ----
  let dragId = null;
  function bindDrag(card) {
    card.addEventListener("dragstart", (e) => {
      dragId = card.dataset.id;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", dragId);
    });
    card.addEventListener("dragend", () => {
      dragId = null;
      card.classList.remove("dragging");
      grid.querySelectorAll(".drop-before,.drop-after").forEach((c) => c.classList.remove("drop-before", "drop-after"));
    });
    card.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (!dragId || card.dataset.id === dragId) return;
      const r = card.getBoundingClientRect();
      const after = e.clientX > r.left + r.width / 2;
      card.classList.toggle("drop-after", after);
      card.classList.toggle("drop-before", !after);
    });
    card.addEventListener("dragleave", () => card.classList.remove("drop-before", "drop-after"));
    card.addEventListener("drop", (e) => {
      e.preventDefault();
      if (!dragId || card.dataset.id === dragId) return;
      const r = card.getBoundingClientRect();
      const after = e.clientX > r.left + r.width / 2;
      reorder(dragId, card.dataset.id, after);
      card.classList.remove("drop-before", "drop-after");
    });
  }

  function reorder(fromId, toId, after) {
    const from = pages.findIndex((p) => p.id === fromId);
    if (from < 0) return;
    const [moved] = pages.splice(from, 1);
    let to = pages.findIndex((p) => p.id === toId);
    if (after) to += 1;
    pages.splice(to, 0, moved);
    render();
  }

  // ---- Merge & save ----
  async function merge() {
    if (!pages.length) return;
    overlay.classList.add("show");
    overlayMsg.textContent = "PDF를 병합하는 중…";
    await new Promise((r) => setTimeout(r, 30));
    try {
      const out = await PDFLib.PDFDocument.create();
      const loaded = new Map(); // srcId -> PDFDocument

      for (const p of pages) {
        let doc = loaded.get(p.srcId);
        if (!doc) {
          doc = await PDFLib.PDFDocument.load(sources.get(p.srcId).bytes, { ignoreEncryption: true });
          loaded.set(p.srcId, doc);
        }
        const [copied] = await out.copyPages(doc, [p.index - 1]);
        if (p.rotation) {
          const cur = copied.getRotation().angle || 0;
          copied.setRotation(degrees((cur + p.rotation) % 360));
        }
        out.addPage(copied);
      }

      out.setProducer("Folio");
      out.setCreator("Folio — local PDF editor");
      const bytes = await out.save();
      download(bytes, suggestName());
      overlay.classList.remove("show");
      toast(`${pages.length}개 페이지를 저장했습니다.`);
    } catch (e) {
      console.error(e);
      overlay.classList.remove("show");
      toast("병합 중 오류가 발생했습니다.");
    }
  }

  function suggestName() {
    const first = sources.size ? [...sources.values()][0].name.replace(/\.pdf$/i, "") : "merged";
    const stamp = new Date().toISOString().slice(0, 10);
    return `${first}-병합-${stamp}.pdf`;
  }

  function download(bytes, name) {
    const blob = new Blob([bytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  // ---- Utils ----
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---- Wire up ----
  dropzone.addEventListener("click", () => fileInput.click());
  $("#addMore").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => { loadFiles(e.target.files); fileInput.value = ""; });

  ["dragenter", "dragover"].forEach((ev) =>
    dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add("drag"); })
  );
  ["dragleave", "drop"].forEach((ev) =>
    dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove("drag"); })
  );
  dropzone.addEventListener("drop", (e) => loadFiles(e.dataTransfer.files));

  // allow dropping files anywhere once editing
  window.addEventListener("dragover", (e) => { if (e.dataTransfer && [...e.dataTransfer.types].includes("Files")) e.preventDefault(); });
  window.addEventListener("drop", (e) => {
    if (e.dataTransfer && e.dataTransfer.files.length && [...e.dataTransfer.types].includes("Files")) {
      e.preventDefault(); loadFiles(e.dataTransfer.files);
    }
  });

  $("#merge").addEventListener("click", merge);
  $("#clearAll").addEventListener("click", () => {
    if (!pages.length) return;
    if (confirm("불러온 모든 파일과 편집 내용을 비울까요?")) {
      pages = []; sources.clear(); colorMap.clear(); render();
    }
  });

  $("#selRotL").addEventListener("click", () => rotate(selectedIds(), -90));
  $("#selRotR").addEventListener("click", () => rotate(selectedIds(), 90));
  $("#selDel").addEventListener("click", () => removePages(selectedIds()));
  $("#selClear").addEventListener("click", clearSelection);

  // keyboard
  document.addEventListener("keydown", (e) => {
    if (e.target.matches("input, textarea")) return;
    const sel = selectedIds();
    if ((e.key === "Delete" || e.key === "Backspace") && sel.length) { e.preventDefault(); removePages(sel); }
    else if (e.key === "Escape" && sel.length) { clearSelection(); }
    else if ((e.key === "a" || e.key === "A") && (e.metaKey || e.ctrlKey) && pages.length) {
      e.preventDefault(); pages.forEach((p) => (p.selected = true)); render();
    }
  });

  // warn before leaving with unsaved work
  window.addEventListener("beforeunload", (e) => {
    if (pages.length) { e.preventDefault(); e.returnValue = ""; }
  });
})();
</script>
</body>
</html>
